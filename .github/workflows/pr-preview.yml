name: PR Preview (Deploy)

on:
  workflow_run:
    workflows: ["PR Preview (Prepare)"]
    types: [completed]

permissions:
  actions: read

concurrency:
  group: pr-preview-deploy
  cancel-in-progress: true

jobs:
  deploy:
    # GitHub Pages supports one live deployment at a time.
    # PR previews are prepared on gh-pages, but we do not deploy them via
    # deploy-pages because that would overwrite production.
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Download prepared preview site
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-site
          path: _site
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
