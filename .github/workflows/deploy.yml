name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stamp cache version into service worker
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          sed -i "s/__CACHE_VERSION__/${COMMIT}/g" sw.js

      - name: Generate runtime config
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY || vars.SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          node <<'EOF'
          const fs = require('fs');

          const supabaseUrl = (process.env.SUPABASE_URL || '').trim();
          const supabasePublishableKey = (process.env.SUPABASE_PUBLISHABLE_KEY || '').trim();
          const hasHostedLeaderboard = Boolean(supabaseUrl) && Boolean(supabasePublishableKey);

          if ((supabaseUrl && !supabasePublishableKey) || (!supabaseUrl && supabasePublishableKey)) {
            console.error('Hosted leaderboard configuration is incomplete. Set both SUPABASE_URL and SUPABASE_PUBLISHABLE_KEY (or SUPABASE_ANON_KEY).');
            process.exit(1);
          }

          console.log(`Weekly leaderboard backend: ${hasHostedLeaderboard ? 'supabase' : 'local'}`);

          const config = {
            weeklyLeaderboard: {
              backend: hasHostedLeaderboard ? 'supabase' : 'local',
              supabaseUrl: hasHostedLeaderboard ? supabaseUrl : '',
              supabasePublishableKey: hasHostedLeaderboard ? supabasePublishableKey : '',
            },
          };

          fs.writeFileSync('config.js', `window.BUROHAME_RUNTIME_CONFIG = ${JSON.stringify(config, null, 2)};\n`);
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
